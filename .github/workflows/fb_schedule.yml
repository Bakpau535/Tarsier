name: FB Fanspage (Manual Only - now part of main batch)

on:
  # Schedule DISABLED — fb_fanspage is now processed in main batch pipeline (yt_schedule.yml)
  # Keep workflow_dispatch for manual testing only
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-fb-tarsier-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Random Startup Delay
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 1500))
          echo "Waiting ${DELAY} seconds (~$((DELAY/60)) minutes) before starting..."
          sleep $DELAY

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          ffmpeg -version

      - name: Install Google Fonts (Per-Channel Typography)
        run: |
          FONT_DIR="/usr/share/fonts/truetype/google"
          sudo mkdir -p $FONT_DIR
          curl -sL "https://github.com/google/fonts/raw/main/ofl/creepster/Creepster-Regular.ttf" \
            -o /tmp/Creepster-Regular.ttf && sudo mv /tmp/Creepster-Regular.ttf $FONT_DIR/
          curl -sL "https://github.com/google/fonts/raw/main/ofl/playfairdisplay/PlayfairDisplay-BoldItalic.ttf" \
            -o /tmp/PlayfairDisplay-BoldItalic.ttf && sudo mv /tmp/PlayfairDisplay-BoldItalic.ttf $FONT_DIR/
          curl -sL "https://github.com/google/fonts/raw/main/ofl/playfairdisplay/PlayfairDisplay-Bold.ttf" \
            -o /tmp/PlayfairDisplay-Bold.ttf && sudo mv /tmp/PlayfairDisplay-Bold.ttf $FONT_DIR/
          curl -sL "https://github.com/google/fonts/raw/main/ofl/bebasneue/BebasNeue-Regular.ttf" \
            -o /tmp/BebasNeue-Regular.ttf && sudo mv /tmp/BebasNeue-Regular.ttf $FONT_DIR/
          curl -sL "https://github.com/google/fonts/raw/main/ofl/inter/Inter%5Bopsz%2Cwght%5D.ttf" \
            -o /tmp/Inter.ttf && sudo mv /tmp/Inter.ttf $FONT_DIR/
          curl -sL "https://github.com/google/fonts/raw/main/ofl/quicksand/Quicksand%5Bwght%5D.ttf" \
            -o /tmp/Quicksand.ttf && sudo mv /tmp/Quicksand.ttf $FONT_DIR/
          sudo fc-cache -f

      - name: Random Delay (skip on manual trigger)
        if: github.event_name == 'schedule'
        run: |
          delay=$((RANDOM % 21600))
          echo "Scheduled run - sleeping for $delay seconds (max 6 hours)..."
          sleep $delay

      - name: Run Pipeline (FB Only)
        env:
          # PREVIEW_MODE: set to "true" to save videos as artifacts instead of uploading
          PREVIEW_MODE: "false"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_API_KEY_1: ${{ secrets.HF_API_KEY_1 }}
          HF_API_KEY_2: ${{ secrets.HF_API_KEY_2 }}
          HF_API_KEY_3: ${{ secrets.HF_API_KEY_3 }}
          HF_API_KEY_4: ${{ secrets.HF_API_KEY_4 }}
          HF_API_KEY_5: ${{ secrets.HF_API_KEY_5 }}
          HF_API_KEY_6: ${{ secrets.HF_API_KEY_6 }}
          HF_API_KEY_7: ${{ secrets.HF_API_KEY_7 }}
          HF_API_KEY_8: ${{ secrets.HF_API_KEY_8 }}
          HF_API_KEY_9: ${{ secrets.HF_API_KEY_9 }}
          HF_API_KEY_10: ${{ secrets.HF_API_KEY_10 }}
          HF_API_KEY_11: ${{ secrets.HF_API_KEY_11 }}
          HF_API_KEY_12: ${{ secrets.HF_API_KEY_12 }}
          # Cloudflare Workers AI (PRIMARY image generation)
          CF_ACCOUNT_ID_1: ${{ secrets.CF_ACCOUNT_ID_1 }}
          CF_ACCOUNT_ID_2: ${{ secrets.CF_ACCOUNT_ID_2 }}
          CF_ACCOUNT_ID_3: ${{ secrets.CF_ACCOUNT_ID_3 }}
          CF_ACCOUNT_ID_4: ${{ secrets.CF_ACCOUNT_ID_4 }}
          CF_ACCOUNT_ID_5: ${{ secrets.CF_ACCOUNT_ID_5 }}
          CF_ACCOUNT_ID_6: ${{ secrets.CF_ACCOUNT_ID_6 }}
          CF_ACCOUNT_ID_7: ${{ secrets.CF_ACCOUNT_ID_7 }}
          CF_ACCOUNT_ID_8: ${{ secrets.CF_ACCOUNT_ID_8 }}
          CF_ACCOUNT_ID_9: ${{ secrets.CF_ACCOUNT_ID_9 }}
          CF_ACCOUNT_ID_10: ${{ secrets.CF_ACCOUNT_ID_10 }}
          CF_ACCOUNT_ID_11: ${{ secrets.CF_ACCOUNT_ID_11 }}
          CF_ACCOUNT_ID_12: ${{ secrets.CF_ACCOUNT_ID_12 }}
          CF_API_TOKEN_1: ${{ secrets.CF_API_TOKEN_1 }}
          CF_API_TOKEN_2: ${{ secrets.CF_API_TOKEN_2 }}
          CF_API_TOKEN_3: ${{ secrets.CF_API_TOKEN_3 }}
          CF_API_TOKEN_4: ${{ secrets.CF_API_TOKEN_4 }}
          CF_API_TOKEN_5: ${{ secrets.CF_API_TOKEN_5 }}
          CF_API_TOKEN_6: ${{ secrets.CF_API_TOKEN_6 }}
          CF_API_TOKEN_7: ${{ secrets.CF_API_TOKEN_7 }}
          CF_API_TOKEN_8: ${{ secrets.CF_API_TOKEN_8 }}
          CF_API_TOKEN_9: ${{ secrets.CF_API_TOKEN_9 }}
          CF_API_TOKEN_10: ${{ secrets.CF_API_TOKEN_10 }}
          CF_API_TOKEN_11: ${{ secrets.CF_API_TOKEN_11 }}
          CF_API_TOKEN_12: ${{ secrets.CF_API_TOKEN_12 }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FB_ADMIN_EMAIL: ${{ secrets.FB_ADMIN_EMAIL }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
        run: |
          python src/main.py --target fb_fanspage

      # Upload generated videos as downloadable artifacts (PREVIEW_MODE)
      - name: Upload Preview Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tarsier-fb-preview-${{ github.run_number }}
          path: output/
          retention-days: 3
          if-no-files-found: ignore


      - name: Commit and Push Database Update
        run: |
          git config --global user.name "Tarsier Bot"
          git config --global user.email "bot@tarsier.local"
          git add data/topics.json || true
          git add data/pipeline_log.json || true
          git add data/video_ids.json || true
          git add data/used_footage.json || true
          git add data/used_music.json || true
          git add data/used_scripts.json || true
          git diff-index --quiet HEAD && exit 0
          git commit -m "chore: auto-update database (FB)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Rebase conflict on attempt $i. Resolving..."
            git rebase --abort 2>/dev/null || true
            git pull origin main -X ours || true
            git add data/topics.json data/pipeline_log.json data/video_ids.json data/used_footage.json data/used_music.json data/used_scripts.json || true
            git diff-index --quiet HEAD || git commit -m "chore: auto-update database (FB resolved)"
            git push && exit 0
          done
          echo "Push failed after 3 attempts. Skipping."
