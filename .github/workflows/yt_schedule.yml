name: Tarsier Batch Pipeline (Vertical Shorts)

on:
  # 4x per day schedule — DISABLED until video quality approved
  # schedule:
  #   - cron: '17 1 * * *'   # Batch 1: ~08:17 WIB
  #   - cron: '41 7 * * *'   # Batch 2: ~14:41 WIB
  #   - cron: '11 13 * * *'  # Batch 3: ~20:11 WIB
  #   - cron: '33 19 * * *'  # Batch 4: ~02:33 WIB
  workflow_dispatch:

concurrency:
  group: yt-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-tarsier-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Random Startup Delay (Anti-Bot)
        if: github.event_name == 'schedule'
        run: |
          # ANTI-BOT: Random delay 0-45 minutes to make posting time unpredictable
          # Combined with per-channel delays in main.py (2-8min each)
          DELAY=$((RANDOM % 2700))
          echo "Anti-bot: waiting ${DELAY} seconds (~$((DELAY/60)) minutes) before starting..."
          sleep $DELAY

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          ffmpeg -version

      - name: Restore YouTube OAuth Tokens
        env:
          TK1: ${{ secrets.YT_SCIENTIFIC_TOKEN }}
          TK2: ${{ secrets.YT_FUNNY_TOKEN }}
          TK3: ${{ secrets.YT_ANTHRO_TOKEN }}
          TK4: ${{ secrets.YT_POV_TOKEN }}
          TK5: ${{ secrets.YT_DRAMA_TOKEN }}
        run: |
          mkdir -p data/tokens
          printf '%s' "$TK1" > data/tokens/yt_documenter_token.json
          printf '%s' "$TK2" > data/tokens/yt_funny_token.json
          printf '%s' "$TK3" > data/tokens/yt_anthro_token.json
          printf '%s' "$TK4" > data/tokens/yt_pov_token.json
          printf '%s' "$TK5" > data/tokens/yt_drama_token.json
          # Validate token files
          for f in data/tokens/*.json; do
            if python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              echo "OK: $f"
            else
              echo "ERROR: $f is NOT valid JSON — upload will fail for this account!"
            fi
          done

      - name: Run Pipeline
        env:
          # PREVIEW_MODE: set to "true" to save videos as artifacts instead of uploading to YouTube
          # Change to "false" when ready for auto-posting
          PREVIEW_MODE: "true"
          # Groq API — PRIMARY text generation
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Gemini API — PRIMARY text generation
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_API_KEY_1: ${{ secrets.HF_API_KEY_1 }}
          HF_API_KEY_2: ${{ secrets.HF_API_KEY_2 }}
          HF_API_KEY_3: ${{ secrets.HF_API_KEY_3 }}
          HF_API_KEY_4: ${{ secrets.HF_API_KEY_4 }}
          HF_API_KEY_5: ${{ secrets.HF_API_KEY_5 }}
          HF_API_KEY_6: ${{ secrets.HF_API_KEY_6 }}
          HF_API_KEY_7: ${{ secrets.HF_API_KEY_7 }}
          HF_API_KEY_8: ${{ secrets.HF_API_KEY_8 }}
          HF_API_KEY_9: ${{ secrets.HF_API_KEY_9 }}
          HF_API_KEY_10: ${{ secrets.HF_API_KEY_10 }}
          HF_API_KEY_11: ${{ secrets.HF_API_KEY_11 }}
          HF_API_KEY_12: ${{ secrets.HF_API_KEY_12 }}
          # Cloudflare Workers AI (PRIMARY image generation)
          CF_ACCOUNT_ID_1: ${{ secrets.CF_ACCOUNT_ID_1 }}
          CF_ACCOUNT_ID_2: ${{ secrets.CF_ACCOUNT_ID_2 }}
          CF_ACCOUNT_ID_3: ${{ secrets.CF_ACCOUNT_ID_3 }}
          CF_ACCOUNT_ID_4: ${{ secrets.CF_ACCOUNT_ID_4 }}
          CF_ACCOUNT_ID_5: ${{ secrets.CF_ACCOUNT_ID_5 }}
          CF_ACCOUNT_ID_6: ${{ secrets.CF_ACCOUNT_ID_6 }}
          CF_ACCOUNT_ID_7: ${{ secrets.CF_ACCOUNT_ID_7 }}
          CF_ACCOUNT_ID_8: ${{ secrets.CF_ACCOUNT_ID_8 }}
          CF_ACCOUNT_ID_9: ${{ secrets.CF_ACCOUNT_ID_9 }}
          CF_ACCOUNT_ID_10: ${{ secrets.CF_ACCOUNT_ID_10 }}
          CF_ACCOUNT_ID_11: ${{ secrets.CF_ACCOUNT_ID_11 }}
          CF_ACCOUNT_ID_12: ${{ secrets.CF_ACCOUNT_ID_12 }}
          CF_API_TOKEN_1: ${{ secrets.CF_API_TOKEN_1 }}
          CF_API_TOKEN_2: ${{ secrets.CF_API_TOKEN_2 }}
          CF_API_TOKEN_3: ${{ secrets.CF_API_TOKEN_3 }}
          CF_API_TOKEN_4: ${{ secrets.CF_API_TOKEN_4 }}
          CF_API_TOKEN_5: ${{ secrets.CF_API_TOKEN_5 }}
          CF_API_TOKEN_6: ${{ secrets.CF_API_TOKEN_6 }}
          CF_API_TOKEN_7: ${{ secrets.CF_API_TOKEN_7 }}
          CF_API_TOKEN_8: ${{ secrets.CF_API_TOKEN_8 }}
          CF_API_TOKEN_9: ${{ secrets.CF_API_TOKEN_9 }}
          CF_API_TOKEN_10: ${{ secrets.CF_API_TOKEN_10 }}
          CF_API_TOKEN_11: ${{ secrets.CF_API_TOKEN_11 }}
          CF_API_TOKEN_12: ${{ secrets.CF_API_TOKEN_12 }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FB_ADMIN_EMAIL: ${{ secrets.FB_ADMIN_EMAIL }}
          YT_1_JASON: ${{ secrets.YT_1_JASON }}
          YT_2_JASON: ${{ secrets.YT_2_JASON }}
          YT_3_JASON: ${{ secrets.YT_3_JASON }}
          YT_4_JASON: ${{ secrets.YT_4_JASON }}
          YT_5_JASON: ${{ secrets.YT_5_JASON }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
        run: |
          # PREVIEW MODE: Videos saved to output/ as artifacts (NOT uploaded to YouTube)
          python src/main.py

      # Upload generated videos as downloadable artifacts (PREVIEW_MODE)
      - name: Upload Preview Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tarsier-preview-${{ github.run_number }}
          path: output/
          retention-days: 3
          if-no-files-found: ignore

      - name: Commit and Push Database Update
        run: |
          git config --global user.name "Tarsier Bot"
          git config --global user.email "bot@tarsier.local"
          git add data/topics.json || true
          git add data/pipeline_log.json || true
          git add data/video_ids.json || true
          git add data/used_footage.json || true
          git add data/used_music.json || true
          git add data/used_scripts.json || true
          git add data/used_fallback_idx.json || true
          git diff-index --quiet HEAD && exit 0
          git commit -m "chore: auto-update database"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Rebase conflict on attempt $i. Resolving..."
            git rebase --abort 2>/dev/null || true
            git pull origin main -X ours || true
            git add data/topics.json data/pipeline_log.json data/video_ids.json data/used_footage.json data/used_music.json data/used_scripts.json data/used_fallback_idx.json || true
            git diff-index --quiet HEAD || git commit -m "chore: auto-update database (resolved)"
            git push && exit 0
          done
          echo "Push failed after 3 attempts. Skipping."

